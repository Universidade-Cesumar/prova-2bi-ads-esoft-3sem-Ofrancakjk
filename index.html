<!DOCTYPE html>
<html lang="pt-BR" class="h-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Almoxarifado - Clean & Minimal Header</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Ajuste de largura para manter a estética centralizada do Almoxarifado */
        .cover-container {
            max-width: 50em;
        }
    </style>
</head>
<body class="d-flex flex-column h-100 bg-white text-dark">

    <header class="text-bg-dark py-3 shadow-sm">
        <div class="container cover-container d-flex justify-content-center align-items-center">
            <h3 class="mb-0 fw-bold">Almoxarifado</h3>
        </div>
    </header>

    <h1>Controle de Estoque</h1>
    <form id="formProduto">
        <input type="text" id="input-nome" placeholder="Nome do Produto" required>
        <input type="text" id="input-quantidade" placeholder="Quantidade" required>
        <input type="number" id="btn-cadastrar" placeholder="Cadastrar" required>
        <button type="submit">
            
        </button>
    </form>
    <hr>
    <input type="text" id="pesquisa" placeholder="Pesquisar Produto">
    <div id="listaProdutos"></div>
        </main>

        <footer class="mt-5 pt-4 text-muted text-center border-top">
            <p> Sistema de Controle de Almoxarifado.</p>
        </footer>
    </div>

    <script src="main.js"></script>
</body>
</html>
