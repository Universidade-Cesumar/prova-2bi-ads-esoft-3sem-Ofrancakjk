<!DOCTYPE html>
<html lang="pt-BR" class="h-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Almoxarifado - Controle de Estoque</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .cover-container { max-width: 55em; }
    </style>
</head>
<body class="d-flex flex-column h-100 bg-white text-dark">

    <header class="text-bg-dark py-3 shadow-sm">
        <div class="container cover-container d-flex justify-content-center align-items-center">
            <h3 class="mb-0 fw-bold">Almoxarifado</h3>
        </div>
    </header>

    <div class="cover-container w-100 p-3 mx-auto flex-grow-1 d-flex flex-column mt-4 text-center">
        <main class="px-3 mb-auto">
            <h2 class="fw-bold text-dark mb-4">Controle de Estoque</h2>
            
            <form id="formProduto" class="row g-2 justify-content-center mb-4 text-start">
                <div class="col-md-6">
                    <input type="text" class="form-control form-control-lg bg-light border-secondary-subtle" id="input-nome" placeholder="Nome do Produto" required>
                </div>
                <div class="col-md-3">
                    <input type="number" class="form-control form-control-lg bg-light border-secondary-subtle" id="input-quantidade" placeholder="Qtd" required min="1">
                </div>
                <div class="col-md-3">
                    <button type="button" class="btn btn-dark btn-lg fw-bold w-100 shadow-sm" id="btn-cadastrar">Cadastrar</button>
                </div>
            </form>

            <hr class="my-4 border-secondary-subtle">

            <div id="lista-materiais" class="row text-start mt-3"></div>
        </main>

        <footer class="mt-5 pt-4 text-muted text-center border-top">
            <p>Sistema de Controle de Almoxarifado.</p>
        </footer>
    </div>

    <script src="main.js"></script>
</body>
</html>
